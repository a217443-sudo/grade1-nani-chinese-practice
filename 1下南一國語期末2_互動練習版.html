<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>一年級下學期南一國語期末2互動練習</title>
  <style>
    @page { size: A3 landscape; margin: 10mm; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: #101418;
      background: #e8edf2;
      font-family: "Microsoft JhengHei", "Noto Sans TC", "PingFang TC", Arial, sans-serif;
    }
    .app {
      width: min(100%, 420mm);
      min-height: 297mm;
      margin: 0 auto;
      padding: 10mm;
      background: #fff;
    }
    header {
      display: grid;
      grid-template-columns: 1.25fr .9fr;
      gap: 8mm;
      align-items: start;
      padding-bottom: 5mm;
      border-bottom: 2px solid #111;
      margin-bottom: 5mm;
    }
    h1 { margin: 0 0 2mm; font-size: 24pt; letter-spacing: 0; }
    h2 { margin: 0 0 3mm; font-size: 16pt; }
    .sub { font-size: 12pt; line-height: 1.6; }
    .panel {
      border: 1px solid #2b2f33;
      background: #f7f9fb;
      padding: 3mm;
      font-size: 10.8pt;
      line-height: 1.55;
    }
    .layout {
      display: grid;
      grid-template-columns: 76mm 1fr;
      gap: 6mm;
    }
    .sidebar {
      border-right: 1.5px solid #222;
      padding-right: 4mm;
    }
    .btn {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1.5px solid #222;
      background: #fff;
      padding: 3mm;
      margin-bottom: 2.3mm;
      font-size: 11.8pt;
      cursor: pointer;
      text-align: left;
    }
    .btn.active { background: #111; color: #fff; }
    .filter-title {
      margin: 0 0 2mm;
      font-size: 13.5pt;
      font-weight: 700;
    }
    .lesson-filter {
      display: grid;
      gap: 1.8mm;
      margin-bottom: 5mm;
    }
    .lesson-check {
      display: flex;
      align-items: center;
      gap: 2mm;
      border: 1px solid #c5cbd3;
      background: #fff;
      padding: 2mm;
      font-size: 10.8pt;
      line-height: 1.35;
      cursor: pointer;
    }
    .lesson-check input {
      width: 4mm;
      height: 4mm;
      margin: 0;
    }
    .mini-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2mm;
      margin-bottom: 5mm;
    }
    .mini-actions button {
      border: 1px solid #222;
      background: #fff;
      padding: 2mm;
      font-size: 10.5pt;
      cursor: pointer;
    }
    .generate-action {
      width: 100%;
      border: 1.5px solid #155eef;
      background: #155eef;
      color: #fff;
      padding: 3mm;
      margin-bottom: 5mm;
      font-size: 11.5pt;
      cursor: pointer;
    }
    .practice-title {
      display: flex;
      justify-content: space-between;
      gap: 5mm;
      align-items: end;
      margin-bottom: 3mm;
    }
    .practice-title h2 { margin: 0; font-size: 18pt; }
    .hint { font-size: 10.5pt; color: #444; line-height: 1.5; }
    .questions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3mm 6mm;
    }
    .card {
      border: 1px solid #333;
      padding: 3mm;
      break-inside: avoid;
      background: #fff;
      min-height: 22mm;
    }
    .q {
      font-size: 13pt;
      line-height: 1.65;
      margin-bottom: 1mm;
    }
    .lesson {
      display: inline-block;
      border: 1px solid #999;
      background: #f1f3f5;
      padding: .5mm 1.8mm;
      font-size: 9.5pt;
      margin-bottom: 1.5mm;
    }
    .line {
      display: inline-block;
      min-width: 36mm;
      height: 7mm;
      border-bottom: 1.3px solid #111;
      vertical-align: middle;
    }
    .longline {
      display: block;
      height: 9mm;
      border-bottom: 1.3px solid #111;
      margin-top: 1mm;
    }
    .sentence-card {
      min-height: 34mm;
    }
    .example {
      background: #f6f8fa;
      border-left: 4px solid #111;
      padding: 2mm;
      margin: 1.5mm 0;
      font-size: 11.5pt;
      line-height: 1.5;
    }
    .scene {
      position: relative;
      min-height: 34mm;
      border: 1.4px solid #111;
      background: linear-gradient(#dff2ff 0 62%, #dff4cf 62% 100%);
      overflow: hidden;
      margin-bottom: 2mm;
    }
    .scene .sun {
      position: absolute;
      width: 11mm;
      height: 11mm;
      border-radius: 50%;
      background: #ffd95a;
      top: 4mm;
      right: 6mm;
      border: 1px solid #111;
    }
    .scene .tree {
      position: absolute;
      width: 10mm;
      height: 20mm;
      left: 8mm;
      bottom: 5mm;
      background: #8b5a2b;
    }
    .scene .tree::before {
      content: "";
      position: absolute;
      width: 24mm;
      height: 18mm;
      border-radius: 50%;
      background: #4f9d55;
      left: -7mm;
      top: -12mm;
      border: 1px solid #111;
    }
    .scene .card-img {
      position: absolute;
      width: 20mm;
      height: 14mm;
      background: #fff;
      border: 1.4px solid #111;
      left: 34mm;
      bottom: 10mm;
    }
    .scene .card-img::after {
      content: "❤";
      position: absolute;
      color: #d93025;
      left: 7mm;
      top: 2mm;
      font-size: 14pt;
    }
    .scene .person {
      position: absolute;
      width: 8mm;
      height: 14mm;
      background: #2f80ed;
      border: 1px solid #111;
      border-radius: 3mm 3mm 1mm 1mm;
      left: 25mm;
      bottom: 5mm;
    }
    .scene .person::before {
      content: "";
      position: absolute;
      width: 7mm;
      height: 7mm;
      border-radius: 50%;
      background: #ffd6a5;
      border: 1px solid #111;
      top: -7mm;
      left: .3mm;
    }
    .scene .pond {
      position: absolute;
      width: 42mm;
      height: 16mm;
      border-radius: 50%;
      background: #8fd3ff;
      border: 1.4px solid #111;
      left: 16mm;
      bottom: 5mm;
    }
    .scene .star {
      position: absolute;
      color: #f5b700;
      font-size: 17pt;
      top: 8mm;
      left: 28mm;
    }
    .scene .duck {
      position: absolute;
      width: 15mm;
      height: 9mm;
      background: #ffd95a;
      border: 1px solid #111;
      border-radius: 50% 45% 45% 50%;
      left: 29mm;
      bottom: 12mm;
    }
    .scene .duck::before {
      content: "";
      position: absolute;
      width: 8mm;
      height: 8mm;
      border-radius: 50%;
      background: #ffd95a;
      border: 1px solid #111;
      right: -4mm;
      top: -4mm;
    }
    .scene .well {
      position: absolute;
      width: 24mm;
      height: 15mm;
      border: 2px solid #555;
      border-radius: 50% / 35%;
      background: #cfd4da;
      left: 26mm;
      bottom: 6mm;
    }
    .scene .frog {
      position: absolute;
      width: 13mm;
      height: 9mm;
      border-radius: 50%;
      background: #69b34c;
      border: 1px solid #111;
      left: 31mm;
      bottom: 17mm;
    }
    .scene .book {
      position: absolute;
      width: 22mm;
      height: 15mm;
      background: #fff;
      border: 1.4px solid #111;
      left: 38mm;
      bottom: 9mm;
      transform: rotate(-4deg);
    }
    .scene .food {
      position: absolute;
      width: 13mm;
      height: 9mm;
      border-radius: 50%;
      background: #b5651d;
      border: 1px solid #111;
      left: 42mm;
      bottom: 8mm;
    }
    .reader-list {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 2mm;
      margin-bottom: 4mm;
    }
    .reader-btn {
      border: 1.5px solid #222;
      background: #fff;
      padding: 2.2mm;
      font-size: 10.5pt;
      cursor: pointer;
    }
    .reader-btn.active {
      background: #111;
      color: #fff;
    }
    .reading-wrap {
      display: grid;
      grid-template-columns: .9fr 1.1fr;
      gap: 5mm;
    }
    .article {
      border: 1.5px solid #111;
      background: #fff9e8;
      padding: 4mm;
      font-size: 14pt;
      line-height: 1.95;
      min-height: 120mm;
    }
    .article h3 {
      margin: 0 0 2mm;
      font-size: 16pt;
    }
    .reading-questions .card {
      min-height: 18mm;
      margin-bottom: 2.5mm;
    }
    @media print {
      body { background: #fff; }
      .app { width: 420mm; min-height: 297mm; }
      .sidebar { display: none; }
      .layout { display: block; }
      .questions { grid-template-columns: 1fr 1fr; }
      .reader-list { display: none; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>一年級國語期末2互動練習</h1>
        <div class="sub">南一版｜下學期｜範圍：第 7 課～第 12 課｜繁體中文</div>
        <div class="sub">畫畫、給松鼠的卡片、張奶奶的寶貝、井裡的小青蛙、吃星星的小鴨子、快樂不止一半</div>
      </div>
      <div class="panel">
        <b>使用方式</b><br>
        左側選擇題型後，右側只顯示該題型的練習。此版本不顯示答案，適合直接讓孩子作答或列印練習。
      </div>
    </header>

    <section class="layout">
      <aside class="sidebar">
        <div class="filter-title">選擇課文範圍</div>
        <div class="lesson-filter" id="lessonFilter">
          <label class="lesson-check"><input type="checkbox" value="畫畫" checked>第 7 課　畫畫</label>
          <label class="lesson-check"><input type="checkbox" value="給松鼠的卡片" checked>第 8 課　給松鼠的卡片</label>
          <label class="lesson-check"><input type="checkbox" value="張奶奶的寶貝" checked>第 9 課　張奶奶的寶貝</label>
          <label class="lesson-check"><input type="checkbox" value="井裡的小青蛙" checked>第 10 課　井裡的小青蛙</label>
          <label class="lesson-check"><input type="checkbox" value="吃星星的小鴨子" checked>第 11 課　吃星星的小鴨子</label>
          <label class="lesson-check"><input type="checkbox" value="快樂不止一半" checked>第 12 課　快樂不止一半</label>
        </div>
        <div class="mini-actions">
          <button id="selectAllLessons" type="button">全選</button>
          <button id="clearLessons" type="button">清除</button>
        </div>
        <button class="generate-action" id="generateNewSet" type="button">再出一份題目</button>
        <h2>選擇練習類型</h2>
        <button class="btn active" data-type="correct">圈出正確的字 <span>20 題</span></button>
        <button class="btn" data-type="choice">選出正確答案 <span>20 題</span></button>
        <button class="btn" data-type="fill">填詞選空 <span>18 題</span></button>
        <button class="btn" data-type="picture">看圖情境題 <span>12 題</span></button>
        <button class="btn" data-type="reorder">重組句子 <span>16 題</span></button>
        <button class="btn" data-type="sentence">照樣造句 <span>14 題</span></button>
        <button class="btn" data-type="wrongword">改錯字 <span>16 題</span></button>
        <button class="btn" data-type="punctuation">標點符號 <span>14 題</span></button>
        <button class="btn" data-type="classifier">量詞練習 <span>14 題</span></button>
        <button class="btn" data-type="reading">閱讀理解 <span>10 篇</span></button>
        <div class="panel" style="margin-top:4mm;">
          <b>常見考題延伸</b><br>
          除基本五大題型外，低年級期末也常出現改錯字、標點符號、量詞與閱讀題組。
        </div>
      </aside>

      <section>
        <div class="practice-title">
          <div>
            <h2 id="title">圈出正確的字</h2>
            <div class="hint" id="hint">練習形近字、同音字與課文高頻生字。</div>
          </div>
          <div class="hint" id="count"></div>
        </div>
        <div id="content"></div>
      </section>
    </section>
  </main>

        items: [
          ["", "一（　）彩色筆<span class='line'></span>", "畫畫"],
          ["", "一（　）祝福卡<span class='line'></span>", "給松鼠的卡片"],
          ["", "一（　）樹洞<span class='line'></span>", "給松鼠的卡片"],
          ["", "一（　）手帕<span class='line'></span>", "張奶奶的寶貝"],
          ["", "一（　）天空<span class='line'></span>", "井裡的小青蛙"],
          ["", "一（　）波紋<span class='line'></span>", "吃星星的小鴨子"],
          ["", "一（　）地瓜餅<span class='line'></span>", "快樂不止一半"]
        ]
      }
    };

    const generatedReadings = [
      {
        title: "新閱讀一：一張沒有名字的畫",
        lessons: ["畫畫", "給松鼠的卡片"],
        text: "小可在美勞課畫了一張森林圖，圖裡有大樹、果子和一隻小松鼠。她本來想把名字寫得大大的，可是想到這張圖是要送給公園裡的小松鼠，就改寫了一句：「希望你每天都有安全的地方休息。」放學後，小可把圖做成卡片，和爸爸一起放在樹下。爸爸說：「你沒有看到小松鼠收到卡片，可是你的心意已經在卡片裡了。」小可聽了，覺得很安心。",
        questions: ["小可畫的森林圖裡有什麼？ A. 大樹、果子和小松鼠 B. 火車和車票 C. 雨傘和鞋子", "小可把圖做成什麼？ A. 卡片 B. 書包 C. 帽子", "爸爸說心意在哪裡？ A. 卡片裡 B. 鞋子裡 C. 水杯裡", "照樣寫句子：你的心意已經在卡片裡了。<span class='longline'></span>"]
      },
      {
        title: "新閱讀二：最亮的寶貝",
        lessons: ["張奶奶的寶貝"],
        text: "張奶奶的櫃子裡沒有新玩具，也沒有閃亮的項鍊，只有一本厚厚的相簿。小朋友問她：「這本相簿為什麼這麼重要？」張奶奶一頁一頁翻給大家看，照片裡有畢業的學生、校園裡的花，也有小朋友寫給她的謝卡。她說：「這些照片讓我記得，我曾經和很多孩子一起度過快樂的日子。」大家才明白，真正的寶貝不一定很貴，卻一定很珍貴。",
        questions: ["張奶奶的櫃子裡最重要的是什麼？ A. 相簿 B. 項鍊 C. 玩具", "相簿裡有什麼？ A. 學生、花和謝卡 B. 星星和池塘 C. 地瓜餅", "真正的寶貝不一定怎麼樣？ A. 很貴 B. 很小 C. 很乾淨", "照樣寫句子：真正的寶貝不一定很貴，卻一定很珍貴。<span class='longline'></span>"]
      },
      {
        title: "新閱讀三：跳出去以後",
        lessons: ["井裡的小青蛙"],
        text: "小青蛙住在井裡時，常對自己說：「我已經看過天空了。」一天，牠跟著蝴蝶跳出井口，才發現天空不是小小的一塊，而是連到很遠很遠的地方。牠看見小路通向花田，也看見小鳥飛過山邊。小青蛙回到井邊，沒有再說自己什麼都知道，只對朋友說：「我們一起出去看看吧！」",
        questions: ["小青蛙跟著誰跳出井口？ A. 蝴蝶 B. 小鴨子 C. 張奶奶", "小青蛙出去後看見什麼？ A. 花田和小鳥 B. 鉛筆盒 C. 教室", "小青蛙後來邀朋友做什麼？ A. 一起出去看看 B. 一起睡覺 C. 一起藏起來", "照樣寫句子：我們一起出去看看吧！<span class='longline'></span>"]
      },
      {
        title: "新閱讀四：池塘像鏡子",
        lessons: ["吃星星的小鴨子"],
        text: "風停了，池塘的水面平平的，像一面大鏡子。小鴨子看見雲在水裡走，也看見月亮在水裡亮。牠低頭碰了一下水面，月亮立刻變成一圈一圈的光。鴨媽媽告訴牠：「這不是月亮破了，是水面動了，倒影也跟著動。」小鴨子想，原來眼睛看到的事，還要用腦袋想一想。",
        questions: ["水面像什麼？ A. 鏡子 B. 書包 C. 地瓜", "小鴨子碰水面後，月亮變成什麼？ A. 一圈一圈的光 B. 一張卡片 C. 一棵樹", "鴨媽媽說倒影為什麼會動？ A. 水面動了 B. 月亮跑了 C. 星星掉了", "照樣寫句子：眼睛看到的事，還要用腦袋想一想。<span class='longline'></span>"]
      },
      {
        title: "新閱讀五：一起吃更甜",
        lessons: ["快樂不止一半"],
        text: "小恩家收了很多地瓜。她挑了一顆最大的地瓜，想自己留著吃。可是媽媽把地瓜切成好幾塊，請鄰居和朋友一起吃。小恩一開始覺得可惜，後來聽見大家說地瓜很甜，還有人分享自己的點心，她才發現，自己吃一整顆地瓜很開心，和大家一起吃卻更開心。",
        questions: ["小恩一開始想留下哪一顆地瓜？ A. 最大的 B. 最小的 C. 壞掉的", "媽媽怎麼做？ A. 切成好幾塊分給大家 B. 全部藏起來 C. 丟進池塘", "小恩最後發現什麼？ A. 一起吃更開心 B. 地瓜不好吃 C. 朋友不喜歡她", "照樣寫句子：自己吃很開心，和大家一起吃卻更開心。<span class='longline'></span>"]
      }
    ];

    let current = "correct";
    let currentReading = 0;
    let generatedMode = false;
    const content = document.querySelector("#content");
    const title = document.querySelector("#title");
    const hint = document.querySelector("#hint");
    const count = document.querySelector("#count");
    const lessonInputs = [...document.querySelectorAll("#lessonFilter input")];

    function selectedLessons() {
      return lessonInputs.filter(input => input.checked).map(input => input.value);
    }

    function itemLesson(item) {
      return item[2] || item[0];
    }

    function activeData() {
      return generatedMode ? generatedData : data;
    }

    function activeReadings() {
      return generatedMode ? generatedReadings : readings;
    }

    function isIncludedLesson(lesson, selected) {
      if (!selected.length) return false;
      if (!lesson) return true;
      if (lesson === "綜合" || lesson === "句型") return selected.length >= 2;
      return selected.includes(lesson);
    }

    function filteredItems(group) {
      const selected = selectedLessons();
      return group.items.filter(item => isIncludedLesson(itemLesson(item), selected));
    }

    function filteredReadings() {
      const selected = selectedLessons();
      if (!selected.length) return [];
      return activeReadings().filter(reading => reading.lessons.some(lesson => selected.includes(lesson)));
    }

    function updateTypeCounts() {
      const source = activeData();
      document.querySelectorAll(".btn").forEach(btn => {
        const span = btn.querySelector("span");
        const type = btn.dataset.type;
        if (type === "reading") {
          span.textContent = `${filteredReadings().length} 篇`;
          return;
        }
        span.textContent = `${filteredItems(source[type]).length} 題`;
      });
    }

    function renderCards(group, items) {
      if (!items.length) {
        content.innerHTML = `<div class="panel">目前選取的課文範圍沒有這個題型的題目。請多選幾課，或切換其他練習類型。</div>`;
        return;
      }
      content.innerHTML = `<div class="questions">${
        items.map((item, index) => `
          <article class="card ${group.className || ""}">
            ${item[0] ? `<span class="lesson">${item[0]}</span>` : ""}
            <div class="q">${index + 1}. ${item[1]}</div>
          </article>
        `).join("")
      }</div>`;
    }

    function renderReading() {
      const list = filteredReadings();
      title.textContent = "閱讀理解";
      hint.textContent = "先選一篇文章，讀完整篇內文，再回答右側問題。";
      count.textContent = `${list.length} 篇閱讀`;
      if (!list.length) {
        content.innerHTML = `<div class="panel">目前選取的課文範圍沒有閱讀文章。請至少選擇一課，或多選幾課。</div>`;
        return;
      }
      if (currentReading >= list.length) currentReading = 0;
      const item = list[currentReading];
      const selector = list.map((r, i) => `<button class="reader-btn ${i === currentReading ? "active" : ""}" data-reading="${i}">${i + 1}. ${r.title.replace(/^閱讀[一二三四五六七八九十]：/, "")}</button>`).join("");
      content.innerHTML = `
        <div class="reader-list">${selector}</div>
        <div class="reading-wrap">
          <article class="article">
            <h3>${item.title}</h3>
            ${item.text}
          </article>
          <section class="reading-questions">
            ${item.questions.map((q, i) => `
              <article class="card">
                <div class="q">${i + 1}. ${q}</div>
                <span class="longline"></span>
              </article>
            `).join("")}
          </section>
        </div>
      `;
      document.querySelectorAll(".reader-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          currentReading = Number(btn.dataset.reading);
          renderReading();
        });
      });
    }

    function render(type) {
      current = type;
      updateTypeCounts();
      document.querySelectorAll(".btn").forEach(btn => btn.classList.toggle("active", btn.dataset.type === type));
      if (type === "reading") {
        renderReading();
        return;
      }
      const group = activeData()[type];
      const items = filteredItems(group);
      title.textContent = group.title;
      hint.textContent = group.hint;
      count.textContent = `${items.length} 題`;
      renderCards(group, items);
    }

    document.querySelectorAll(".btn").forEach(btn => {
      btn.addEventListener("click", () => render(btn.dataset.type));
    });
    lessonInputs.forEach(input => {
      input.addEventListener("change", () => {
        currentReading = 0;
        render(current);
      });
    });
    document.querySelector("#selectAllLessons").addEventListener("click", () => {
      lessonInputs.forEach(input => input.checked = true);
      currentReading = 0;
      render(current);
    });
    document.querySelector("#clearLessons").addEventListener("click", () => {
      lessonInputs.forEach(input => input.checked = false);
      currentReading = 0;
      render(current);
    });
    document.querySelector("#generateNewSet").addEventListener("click", () => {
      generatedMode = true;
      currentReading = 0;
      document.querySelector("#generateNewSet").textContent = "已換成新題目";
      render(current);
    });
    render(current);
  </script>
</body>
</html>
