<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>小一數學單元互動測驗</title>
  <style>
    :root {
      --ink: #1f2937;
      --muted: #64748b;
      --line: #d7dee8;
      --paper: #fffdf7;
      --accent: #0f766e;
      --accent-soft: #d9f3ef;
      --warn: #b45309;
      --bg: #f4f7fb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft JhengHei", "Noto Sans TC", Arial, sans-serif;
      color: var(--ink);
      background: var(--bg);
      line-height: 1.55;
    }
    header {
      padding: 24px 20px 14px;
      background: #ffffff;
      border-bottom: 1px solid var(--line);
    }
    .wrap { max-width: 980px; margin: 0 auto; }
    h1 { margin: 0 0 8px; font-size: 28px; letter-spacing: 0; }
    .sub { margin: 0; color: var(--muted); font-size: 15px; }
    main { padding: 18px 20px 40px; }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      align-items: end;
      margin-bottom: 16px;
    }
    label { display: block; font-weight: 700; margin-bottom: 6px; }
    select, button {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font-size: 16px;
      padding: 8px 12px;
      font-family: inherit;
    }
    .unit-options {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }
    .unit-options label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fafc;
      font-weight: 700;
      cursor: pointer;
    }
    .unit-options input {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      flex: 0 0 auto;
    }
    button {
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 700;
      white-space: nowrap;
    }
    button.secondary {
      background: #fff;
      color: var(--accent);
    }
    .analysis {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 16px;
    }
    .analysis h2 { margin: 0 0 8px; font-size: 18px; }
    .analysis ul { margin: 8px 0 0 20px; padding: 0; }
    .paper {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 22px;
      box-shadow: 0 10px 28px rgba(15, 23, 42, .06);
    }
    .paper-head {
      display: grid;
      grid-template-columns: 1fr 160px;
      gap: 12px;
      border-bottom: 2px solid var(--ink);
      padding-bottom: 12px;
      margin-bottom: 18px;
    }
    .paper-title { font-size: 24px; font-weight: 800; }
    .meta { color: var(--muted); font-size: 14px; margin-top: 4px; }
    .score {
      border: 2px solid var(--ink);
      min-height: 64px;
      display: grid;
      place-items: center;
      font-weight: 800;
      background: #fff;
    }
    .student-line {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 18px;
      font-size: 15px;
    }
    .blank { border-bottom: 1px solid var(--ink); min-height: 24px; }
    section { margin-top: 20px; }
    h3 { font-size: 19px; margin: 0 0 10px; }
    ol { margin: 0; padding-left: 26px; }
    li { margin: 0 0 12px; break-inside: avoid; }
    .choices { display: flex; flex-wrap: wrap; gap: 10px 18px; margin-top: 6px; }
    .boxline { display: inline-block; min-width: 72px; border-bottom: 1px solid var(--ink); height: 1.6em; vertical-align: bottom; }
    .visual {
      display: inline-block;
      width: 100%;
      max-width: 620px;
      margin: 8px 0 6px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      vertical-align: top;
    }
    .ten-bundles { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .bundle {
      min-width: 36px;
      padding: 5px 7px;
      border: 2px solid #0f766e;
      border-radius: 6px;
      background: var(--accent-soft);
      font-weight: 800;
      text-align: center;
    }
    .ones { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
    .one-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #f59e0b;
      border: 1px solid #92400e;
      display: inline-block;
    }
    .hundred-mini {
      display: grid;
      grid-template-columns: repeat(10, 34px);
      gap: 3px;
      width: max-content;
      max-width: 100%;
      overflow-x: auto;
    }
    .hundred-mini span, .calendar span {
      display: grid;
      place-items: center;
      min-height: 28px;
      border: 1px solid var(--line);
      background: #f8fafc;
      font-size: 13px;
    }
    .hundred-mini .mark, .calendar .mark { background: #fde68a; border-color: #b45309; font-weight: 800; }
    .number-line {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 0;
      align-items: end;
      padding-top: 8px;
    }
    .number-line span {
      border-top: 3px solid #334155;
      position: relative;
      padding-top: 12px;
      text-align: center;
      min-width: 48px;
    }
    .number-line span::before {
      content: "";
      position: absolute;
      top: -7px;
      left: calc(50% - 5px);
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #334155;
    }
    .coin-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .coin {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      border: 2px solid #a16207;
      background: #fde68a;
      color: #713f12;
      font-weight: 800;
      font-size: 14px;
    }
    .bill {
      min-width: 78px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 2px solid #15803d;
      border-radius: 6px;
      background: #dcfce7;
      color: #14532d;
      font-weight: 800;
    }
    .price-tags, .story-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 8px;
    }
    .tag, .story-cell {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
      text-align: center;
      background: #f8fafc;
      font-weight: 700;
    }
    .calc-box {
      width: 130px;
      margin: 8px 0;
      padding: 8px 12px;
      border: 1px solid var(--line);
      background: #fff;
      font-size: 22px;
      line-height: 1.25;
      text-align: right;
      font-family: Consolas, "Microsoft JhengHei", monospace;
    }
    .calc-box .bar { border-top: 2px solid var(--ink); margin-top: 3px; padding-top: 3px; }
    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 44px);
      gap: 3px;
      width: max-content;
      max-width: 100%;
      overflow-x: auto;
    }
    .calendar .head { background: #e0f2fe; font-weight: 800; }
    .grid-ten {
      display: inline-grid;
      grid-template-columns: repeat(10, 15px);
      gap: 3px;
      vertical-align: middle;
      margin: 0 6px;
    }
    .dot {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: #334155;
      display: inline-block;
    }
    .source {
      color: var(--muted);
      font-size: 13px;
      margin-top: 18px;
      border-top: 1px dashed var(--line);
      padding-top: 10px;
    }
    @media (max-width: 760px) {
      .toolbar { grid-template-columns: 1fr; }
      .paper-head, .student-line { grid-template-columns: 1fr; }
      h1 { font-size: 24px; }
      .paper { padding: 16px; }
    }
    @media print {
      body { background: #fff; }
      header, .toolbar, .analysis { display: none; }
      main { padding: 0; }
      .paper { border: none; box-shadow: none; border-radius: 0; }
    }
  </style>
</head>
<body>

      <h1>小一數學單元互動測驗</h1>
      <p class="sub">選擇單元後，題目會只保留該單元；按「換一份」可切換同範圍不同題組。</p>

  </header>

    <div class="analysis" id="analysis"></div>
    <article class="paper" id="paper"></article>
  </main>

      const checked = [...unitOptions.querySelectorAll("input:checked")].map(input => input.value);
      if (checked.length > 0) return checked;
      const first = unitOptions.querySelector("input");
      first.checked = true;
      return [first.value];
    }

    function render() {
      const units = selectedUnits();
      const setLabel = currentSet % 2 === 0 ? "A卷" : "B卷";
      const title = units.length === 1 ? `${units[0]} ${setLabel}` : `第六至第九單元綜合測驗 ${setLabel}`;
      const scope = units.join("、");
      const combinedSections = units.flatMap(unit => {
        const data = papers[unit];
        const set = data.sets[currentSet % data.sets.length];
        return set.sections.map(section => [`${unit}｜${section[0]}`, section[1]]);
      });
      analysis.innerHTML = `
        <h2>常見考點整理：${units.length === 1 ? units[0] : "綜合出題"}</h2>
        ${units.map(unit => `<h3>${unit}</h3><ul>${papers[unit].basis.map(item => `<li>${item}</li>`).join("")}</ul>`).join("")}

          <div>家長簽名：<span class="blank"></span></div>
        </div>
        ${combinedSections.map(section => `
          <section>
            <h3>${section[0]}</h3>
            <ol>${section[1].map(q => `<li>${q}</li>`).join("")}</ol>
          </section>
        `).join("")}
        <p class="source">命題依公開試卷與教學資源的題型趨勢整理，不照抄原卷內容。</p>
      `;
    }

    unitOptions.addEventListener("change", () => { currentSet = 0; render(); });
    document.getElementById("nextSet").addEventListener("click", () => { currentSet += 1; render(); });
    render();
